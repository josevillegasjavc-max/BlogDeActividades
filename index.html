<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista De Actividades</title>
    <link rel="Icon" href="./resource/logo.png" />
    <link rel="stylesheet" href="/style/style.css">
</head>
<body>
    <header>
        <h1><a href="#inicio">LISTA DE ACTIVIDADES</a></h1>
    </header>
    <main>
        <div class="divMain">
            <form id="inicio" class="insertInfo">
                <h2><a href="#title">INGRESAR INFORMACION</a></h2>
                <label id="labelTi" for="title">Titulo</label>
                <input class="input" id="title" placeholder="" type="text" required>

                <label id="labelTe" for="description">Actividad</label>
                <div class="containButton">
                    <textarea name="description" id="description" class="input" required></textarea>
                    <button type="submit" class="button">+</button>
                </div>
            </form>
        </div>
    </main>
</body>
</html>
