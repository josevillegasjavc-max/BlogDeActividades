<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista De Actividades</title>
    <link rel="stylesheet" href="style/style.css">
</head>
<body>
    <header>
        <h1><a href="#inicio">LISTA DE ACTIVIDADES</a></h1>
    </header>
    <main>
        <div class="divMain">
            <section id="inicio" class="insertInfo">
                <h2>INGRESAR INFORMACION</h2>
                <label id="labelTi" for="title">Titulo</label>
                <input class="input" id="title" placeholder=" " type="text">

                <label id="labelTe" for="text">Actividad</label>
                <div class="containButton">
                    <div id="containText" class="input">
                        <textarea name="text" id="text"></textarea>
                    </div>
                    <button class="button">+</button>
                </div>
            </section>
        </div>
    </main>
</body>
</html>
