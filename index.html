<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista De Actividades</title>
    <link rel="stylesheet" href="./style/main.css">
    <link rel="Icon" href="/resource/logo.png" />
</head>
<body>
    <header>
            <a href="#inicio">
                <img src="./resource/logo.png" alt="logo" class="logo">
                <h1>LISTA DE ACTIVIDADES</h1>
            </a>
    </header>
    <main>
        <div class="divMain">
            <form id="inicio" class="insertInfo">
                <h2 class="titleForm"><a href="#title">INGRESAR INFORMACION</a></h2>
                <label id="labelTi" for="title">Titulo</label>
                <input class="input" id="inputTitle" placeholder="" type="text" required>

                <label id="labelTe" for="inputDescription">Actividad</label>
                <div class="containButton">
                    <textarea name="inputDescription" id="inputDescription" class="input" required></textarea>
                    <button type="submit" class="button" onclick="mostrarInfo(event)" title="Agregar">+</button>
                </div>
            </form>

            <section id="containtActivity"> 
                <div id="containTitle"></div>
                <div id="datos"> </div>
            </section>
            <script src="./script/main.js" type="text/javascript"></script>
        </div>
    </main>
</body>
</html>
