<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista De Actividades</title>
    <link rel="stylesheet" href="./style/main.css">
    <link rel="icon" href="./resource/logo.png">
</head>
<body>
    <header class="header">
            <a class="containLogo">
                <img src="./resource/logo.png" alt="logo" class="logo">
                <h1 id="h1">Lista De Actividades</h1>
            </a>
    </header>
    <main>
        <form id="inicio" class="insertInfo">
            <h2 class="titleForm"><a href="#inputTitle">INGRESAR INFORMACION</a></h2>
            <label id="labelTi" for="inputTitle">Titulo</label>
            <input class="input" id="inputTitle" placeholder="" type="text" required>

            <label id="labelTe" for="inputDescription">Actividad</label>
            <div id="containButton">
                <div id="containDescription" class="input">
                    <textarea name="inputDescription" id="inputDescription" required></textarea>
                </div>
                <div id="btn">
                    <button type="submit" class="button" title="Agregar"><img src="./resource/agregar-documento.png" alt="agregar-documento"></button>
                </div>
            </div>
        </form>
        <section id="containtActivity"> 
            <div id="containTitle">
                <h2 id="titleSection"> 
                    <span id="spantitle">Actividades a Realizar</span> 
                </h2>
            </div>
            <div id="datos"> </div>
        </section>
        <script type="module" src="./script/main.js" ></script>
    </main>
</body>
</html>
